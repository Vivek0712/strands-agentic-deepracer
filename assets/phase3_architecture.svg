<svg width="800" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Entry -->
  <rect x="220" y="16" width="360" height="40" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="400" y="32" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">app_ui.py (Flask)  ·  main.py --vision</text>
  <text x="400" y="47" text-anchor="middle" font-size="10" fill="#7a8090">POST /plan · /execute · GET /stream · /frame</text>

  <line x1="400" y1="56" x2="400" y2="76" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- CameraPolicy orchestrator -->
  <rect x="80" y="76" width="640" height="60" rx="8" fill="#1f242d" stroke="#BA7517" stroke-width="0.5"/>
  <text x="400" y="94" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">camera_policy.py — CameraPolicy(NavigationPolicy)</text>
  <line x1="95" y1="100" x2="705" y2="100" stroke="#633806" stroke-width="0.5"/>
  <text x="220" y="115" text-anchor="middle" font-size="10" fill="#888780">plan() → NovaPolicy</text>
  <text x="400" y="115" text-anchor="middle" font-size="10" fill="#888780">assess_step() → VisionAssessor</text>
  <text x="590" y="115" text-anchor="middle" font-size="10" fill="#888780">camera_stream property</text>
  <line x1="308" y1="101" x2="308" y2="132" stroke="#633806" stroke-width="0.5"/>
  <line x1="490" y1="101" x2="490" y2="132" stroke="#633806" stroke-width="0.5"/>

  <!-- Arrows down from CameraPolicy -->
  <line x1="180" y1="136" x2="180" y2="168" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="400" y1="136" x2="400" y2="168" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="620" y1="136" x2="620" y2="168" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- Three components row -->
  <!-- agent.py / Nova Lite -->
  <rect x="60" y="168" width="240" height="60" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="180" y="185" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif">agent.py — Nova Lite</text>
  <text x="180" y="201" text-anchor="middle" font-size="10" fill="#5DCAA5">15 patterns · rotation math</text>
  <text x="180" y="217" text-anchor="middle" font-size="10" fill="#5DCAA5">obstacle-aware step splitting</text>

  <!-- vision_assessor.py / Nova Pro -->
  <rect x="280" y="168" width="240" height="60" rx="8" fill="#412402" stroke="#f5a623" stroke-width="0.5"/>
  <text x="400" y="185" text-anchor="middle" font-size="12" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif">vision_assessor.py — Nova Pro</text>
  <text x="400" y="201" text-anchor="middle" font-size="10" fill="#EF9F27">raw JPEG bytes · Converse API</text>
  <text x="400" y="217" text-anchor="middle" font-size="10" fill="#EF9F27">continue | replan | abort</text>

  <!-- camera_stream.py -->
  <rect x="500" y="168" width="240" height="60" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="620" y="185" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif">camera_stream.py</text>
  <text x="620" y="201" text-anchor="middle" font-size="10" fill="#5DCAA5">SOI/EOI JPEG parse · Lock</text>
  <text x="620" y="217" text-anchor="middle" font-size="10" fill="#5DCAA5">get_latest_frame() &lt; 1ms</text>

  <!-- Arrows down to execution engine -->
  <line x1="180" y1="228" x2="180" y2="260" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="228" x2="400" y2="260" stroke="#f5a623" stroke-width="1" marker-end="url(#arr-amber)"/>
  <line x1="620" y1="228" x2="620" y2="260" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- DeepRacerTool execution engine -->
  <rect x="60" y="260" width="680" height="72" rx="8" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="400" y="278" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.04em">deepracer_agent_tool.py — DeepRacerTool · _execute_approved_plan()</text>
  <line x1="75" y1="284" x2="725" y2="284" stroke="#633806" stroke-width="0.5"/>

  <!-- Step loop boxes inside -->
  <rect x="80" y="290" width="148" height="34" rx="4" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="154" y="305" text-anchor="middle" font-size="10" fill="#5DCAA5">get_latest_frame()</text>
  <text x="154" y="318" text-anchor="middle" font-size="9" fill="#5F5E5A">&lt; 1ms non-blocking</text>

  <line x1="228" y1="307" x2="248" y2="307" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="248" y="290" width="148" height="34" rx="4" fill="#111318" stroke="#f5a623" stroke-width="0.5"/>
  <text x="322" y="305" text-anchor="middle" font-size="10" fill="#FAC775">assess_step(frame)</text>
  <text x="322" y="318" text-anchor="middle" font-size="9" fill="#5F5E5A">Nova Pro · ~1–3s · timeout 4s</text>

  <line x1="396" y1="307" x2="416" y2="307" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="416" y="290" width="108" height="34" rx="4" fill="#173404" stroke="#3ddc84" stroke-width="0.5"/>
  <text x="470" y="305" text-anchor="middle" font-size="10" fill="#C0DD97">execute_step()</text>
  <text x="470" y="318" text-anchor="middle" font-size="9" fill="#5F5E5A">continue path</text>

  <rect x="533" y="290" width="108" height="34" rx="4" fill="#042C53" stroke="#4ea8de" stroke-width="0.5"/>
  <text x="587" y="305" text-anchor="middle" font-size="10" fill="#B5D4F4">policy.plan()</text>
  <text x="587" y="318" text-anchor="middle" font-size="9" fill="#5F5E5A">replan path</text>

  <rect x="650" y="290" width="78" height="34" rx="4" fill="#501313" stroke="#e84040" stroke-width="0.5"/>
  <text x="689" y="305" text-anchor="middle" font-size="10" fill="#F7C1C1">stop()</text>
  <text x="689" y="318" text-anchor="middle" font-size="9" fill="#5F5E5A">abort path</text>

  <!-- Down arrow to DeepRacer -->
  <line x1="400" y1="332" x2="400" y2="358" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>
  <text x="440" y="348" font-size="9" fill="#5F5E5A">activate_camera() · HTTP API</text>

  <!-- DeepRacer device -->
  <rect x="220" y="358" width="360" height="18" rx="6" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="400" y="371" text-anchor="middle" font-size="11" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif">AWS DeepRacer — ROS2 camera_node → /display_mjpeg</text>

  <!-- Camera feedback arrow back up -->
  <path d="M730 370 L756 370 L756 198 L742 198" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 3" marker-end="url(#arr-teal)"/>
  <text x="760" y="290" font-size="9" fill="#1D9E75" transform="rotate(90 760 290)">MJPEG frames</text>
</svg>
