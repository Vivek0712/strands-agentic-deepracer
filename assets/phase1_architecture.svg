<svg width="800" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- PC container -->
  <rect x="40" y="20" width="720" height="170" rx="12" fill="#111318" stroke="#3a3f4a" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="60" y="40" font-size="10" fill="#5F5E5A" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.08em">PC (OPERATOR)</text>

  <!-- User input -->
  <rect x="80" y="52" width="200" height="44" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="180" y="70" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">"drive forward, turn left"</text>
  <text x="180" y="87" text-anchor="middle" font-size="10" fill="#7a8090">natural language · terminal / browser</text>

  <!-- Arrow -->
  <line x1="280" y1="74" x2="320" y2="74" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Nova Lite planner -->
  <rect x="320" y="52" width="180" height="44" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="1"/>
  <text x="410" y="70" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif">Amazon Nova Lite</text>
  <text x="410" y="87" text-anchor="middle" font-size="10" fill="#5DCAA5">Strands Agent · JSON plan</text>

  <!-- Arrow -->
  <line x1="500" y1="74" x2="540" y2="74" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Human confirm -->
  <rect x="540" y="52" width="180" height="44" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="630" y="70" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">Human confirms</text>
  <text x="630" y="87" text-anchor="middle" font-size="10" fill="#7a8090">[connect, fwd(3), left(1.5), stop]</text>

  <!-- Down arrow to executor -->
  <line x1="630" y1="96" x2="630" y2="126" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- deepracer_tools executor -->
  <rect x="420" y="126" width="420" height="44" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="630" y="144" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">deepracer_tools.py</text>
  <text x="630" y="161" text-anchor="middle" font-size="10" fill="#7a8090">@tool: connect · forward · backward · left · right · stop</text>

  <!-- Down arrow out of PC container -->
  <line x1="630" y1="190" x2="630" y2="220" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="208" font-size="9" fill="#5F5E5A">HTTP API</text>

  <!-- DeepRacer device -->
  <rect x="450" y="220" width="360" height="44" rx="8" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="630" y="238" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif">AWS DeepRacer</text>
  <text x="630" y="254" text-anchor="middle" font-size="10" fill="#888780">aws-deepracer-control-v2 · web console API</text>

  <!-- Plan JSON shown left -->
  <rect x="40" y="126" width="260" height="44" rx="8" fill="#111318" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="60" y="143" font-size="10" fill="#5DCAA5" font-family="'Barlow Mono',monospace">[ {"action":"connect"},</text>
  <text x="60" y="157" font-size="10" fill="#5DCAA5" font-family="'Barlow Mono',monospace">  {"action":"forward","seconds":3.0}, …]</text>
  <line x1="300" y1="148" x2="320" y2="148" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arr-green)"/>
  <text x="310" y="175" text-anchor="middle" font-size="9" fill="#5F5E5A">confirmed plan</text>
  <line x1="320" y1="148" x2="420" y2="148" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 2"/>
</svg>
