<svg width="800" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Entry points row -->
  <rect x="60" y="20" width="200" height="44" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="160" y="38" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">main.py  --mock | --model</text>
  <text x="160" y="54" text-anchor="middle" font-size="10" fill="#7a8090">terminal REPL</text>

  <rect x="280" y="20" width="200" height="44" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="380" y="38" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">app_ui.py  (Flask)</text>
  <text x="380" y="54" text-anchor="middle" font-size="10" fill="#7a8090">POST /plan · /execute · GET /stream</text>

  <!-- Arrows to agent -->
  <line x1="160" y1="64" x2="160" y2="96" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M380 64 L380 80 L270 80 L270 96" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- agent.py / NavigationPolicy -->
  <rect x="60" y="96" width="420" height="72" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="270" y="114" text-anchor="middle" font-size="13" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">agent.py — NavigationPolicy</text>
  <line x1="75" y1="120" x2="465" y2="120" stroke="#3C3489" stroke-width="0.5"/>
  <text x="160" y="136" text-anchor="middle" font-size="10" fill="#AFA9EC">NovaPolicy</text>
  <text x="160" y="150" text-anchor="middle" font-size="9" fill="#7F77DD">Nova Lite · live</text>
  <text x="270" y="136" text-anchor="middle" font-size="10" fill="#AFA9EC">MockPolicy</text>
  <text x="270" y="150" text-anchor="middle" font-size="9" fill="#7F77DD">offline test</text>
  <text x="380" y="136" text-anchor="middle" font-size="10" fill="#AFA9EC">ReplayPolicy</text>
  <text x="380" y="150" text-anchor="middle" font-size="9" fill="#7F77DD">saved patterns</text>
  <line x1="213" y1="121" x2="213" y2="164" stroke="#3C3489" stroke-width="0.5"/>
  <line x1="326" y1="121" x2="326" y2="164" stroke="#3C3489" stroke-width="0.5"/>

  <!-- Nova Lite external -->
  <rect x="520" y="96" width="220" height="44" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="1"/>
  <text x="630" y="114" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif">Amazon Nova Lite</text>
  <text x="630" y="130" text-anchor="middle" font-size="10" fill="#5DCAA5">15 patterns · rotation math · physics</text>
  <line x1="480" y1="120" x2="520" y2="120" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- Down arrow to DeepRacerTool -->
  <line x1="270" y1="168" x2="270" y2="200" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- DeepRacerTool -->
  <rect x="60" y="200" width="420" height="72" rx="8" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="270" y="218" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">deepracer_agent_tool.py — DeepRacerTool(AgentTool)</text>
  <line x1="75" y1="224" x2="465" y2="224" stroke="#633806" stroke-width="0.5"/>
  <text x="160" y="240" text-anchor="middle" font-size="10" fill="#888780">execute · start</text>
  <text x="270" y="240" text-anchor="middle" font-size="10" fill="#888780">status · stop</text>
  <text x="380" y="240" text-anchor="middle" font-size="10" fill="#888780">TaskStatus FSM</text>
  <text x="160" y="254" text-anchor="middle" font-size="9" fill="#5F5E5A">ThreadPoolExecutor(1)</text>
  <text x="310" y="254" text-anchor="middle" font-size="9" fill="#5F5E5A">SSE event_callback → /stream</text>
  <line x1="213" y1="225" x2="213" y2="268" stroke="#633806" stroke-width="0.5"/>
  <line x1="326" y1="225" x2="326" y2="268" stroke="#633806" stroke-width="0.5"/>

  <!-- Down arrow to deepracer_tools -->
  <line x1="270" y1="272" x2="270" y2="292" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- deepracer_tools + DeepRacer -->
  <rect x="60" y="292" width="160" height="16" rx="4" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="140" y="304" text-anchor="middle" font-size="9" fill="#7a8090">deepracer_tools.py @tool</text>
  <line x1="220" y1="300" x2="280" y2="300" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="280" y="288" width="200" height="26" rx="6" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="380" y="305" text-anchor="middle" font-size="11" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif">AWS DeepRacer</text>
</svg>
