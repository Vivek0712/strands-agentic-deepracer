<svg width="800" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e4e9" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.08em">AMAZON NOVA — MODEL ROLES</text>

  <!-- User prompt input -->
  <rect x="310" y="45" width="180" height="40" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="400" y="61" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">"slalom 3 cones, stop on red"</text>
  <text x="400" y="77" text-anchor="middle" font-size="10" fill="#7a8090">natural language instruction</text>

  <!-- Arrow down to Nova Lite -->
  <line x1="400" y1="85" x2="400" y2="105" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Nova Lite box -->
  <rect x="160" y="105" width="220" height="72" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="1"/>
  <text x="270" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.06em">AMAZON NOVA LITE</text>
  <text x="270" y="138" text-anchor="middle" font-size="10" fill="#5DCAA5">us.amazon.nova-lite-v1:0</text>
  <line x1="175" y1="144" x2="365" y2="144" stroke="#085041" stroke-width="0.5"/>
  <text x="270" y="158" text-anchor="middle" font-size="10" fill="#7a8090">text → navigation plan JSON</text>
  <text x="270" y="170" text-anchor="middle" font-size="10" fill="#7a8090">15 patterns · rotation math · physics</text>

  <!-- Arrow: Nova Lite → plan -->
  <line x1="380" y1="141" x2="420" y2="141" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- Plan output -->
  <rect x="420" y="120" width="200" height="42" rx="6" fill="#111318" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="520" y="136" text-anchor="middle" font-size="10" fill="#5DCAA5" font-family="'Barlow Mono',monospace">[forward(1.0), left(1.5),</text>
  <text x="520" y="151" text-anchor="middle" font-size="10" fill="#5DCAA5" font-family="'Barlow Mono',monospace"> forward(1.0), stop]</text>

  <!-- Arrow plan → car -->
  <line x1="520" y1="162" x2="520" y2="192" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>
  <text x="560" y="181" font-size="9" fill="#5F5E5A">execute</text>

  <!-- Nova Pro box -->
  <rect x="540" y="105" width="220" height="72" rx="8" fill="#412402" stroke="#f5a623" stroke-width="1"/>
  <text x="650" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.06em">AMAZON NOVA PRO</text>
  <text x="650" y="138" text-anchor="middle" font-size="10" fill="#EF9F27">us.amazon.nova-pro-v1:0</text>
  <line x1="555" y1="144" x2="745" y2="144" stroke="#633806" stroke-width="0.5"/>
  <text x="650" y="158" text-anchor="middle" font-size="10" fill="#7a8090">JPEG frame + context → decision</text>
  <text x="650" y="170" text-anchor="middle" font-size="10" fill="#7a8090">continue · replan · abort</text>

  <!-- Arrow: camera → Nova Pro -->
  <line x1="650" y1="85" x2="650" y2="105" stroke="#f5a623" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Camera feed source -->
  <rect x="560" y="45" width="180" height="40" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="650" y="61" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif">DeepRacer front camera</text>
  <text x="650" y="77" text-anchor="middle" font-size="10" fill="#7a8090">MJPEG → raw JPEG bytes</text>

  <!-- Arrow Nova Pro → decision -->
  <line x1="540" y1="141" x2="420" y2="175" stroke="#f5a623" stroke-width="1" marker-end="url(#arr-amber)" stroke-dasharray="4 2"/>
  <text x="468" y="163" text-anchor="middle" font-size="9" fill="#f5a623">between steps</text>

  <!-- Decision output -->
  <rect x="340" y="175" width="80" height="24" rx="4" fill="#501313" stroke="#e84040" stroke-width="0.5"/>
  <text x="380" y="191" text-anchor="middle" font-size="10" fill="#F7C1C1">abort</text>

  <rect x="432" y="175" width="80" height="24" rx="4" fill="#412402" stroke="#f5a623" stroke-width="0.5"/>
  <text x="472" y="191" text-anchor="middle" font-size="10" fill="#FAC775">replan</text>

  <rect x="150" y="192" width="180" height="24" rx="4" fill="#173404" stroke="#3ddc84" stroke-width="0.5"/>
  <text x="240" y="208" text-anchor="middle" font-size="10" fill="#C0DD97">continue → next step</text>
</svg>
