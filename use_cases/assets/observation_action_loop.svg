<svg width="720" viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3ddc84" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e84040" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ea8de" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e4e9" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.06em">PHASE 3 — CLOSED-LOOP VISION NAVIGATION</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#7a8090">Observation → Decision → Action loop per step</text>

  <!-- ── Step N of plan ── -->
  <rect x="240" y="70" width="240" height="48" rx="8" fill="#1f242d" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="360" y="89" text-anchor="middle" font-size="13" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">Step N of Plan</text>
  <text x="360" y="108" text-anchor="middle" font-size="11" fill="#7a8090">instruction · step index · history</text>

  <line x1="360" y1="118" x2="360" y2="148" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── get_latest_frame ── -->
  <rect x="215" y="148" width="290" height="48" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="360" y="167" text-anchor="middle" font-size="13" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">get_latest_frame()</text>
  <text x="360" y="186" text-anchor="middle" font-size="11" fill="#5DCAA5">CameraStream · Lock-protected · &lt; 1 ms</text>

  <!-- No frame path -->
  <text x="520" y="162" font-size="10" fill="#5F5E5A">no frame?</text>
  <path d="M505 172 L510 172 L510 194 L505 194" stroke="#3a3f4a" stroke-width="0.5" fill="none"/>
  <text x="520" y="190" font-size="10" fill="#5F5E5A">→ skip, continue</text>

  <line x1="360" y1="196" x2="360" y2="226" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Nova Pro assess ── -->
  <rect x="190" y="226" width="340" height="52" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="360" y="247" text-anchor="middle" font-size="13" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">VisionAssessor.assess(frame, context)</text>
  <text x="360" y="266" text-anchor="middle" font-size="11" fill="#AFA9EC">Nova Pro · Converse API · raw JPEG bytes · timeout 4.0 s</text>

  <line x1="360" y1="278" x2="360" y2="310" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── VisionDecision ── -->
  <rect x="270" y="310" width="180" height="44" rx="8" fill="#3a3f4a" stroke="#BA7517" stroke-width="0.5"/>
  <text x="360" y="327" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">VisionDecision</text>
  <text x="360" y="345" text-anchor="middle" font-size="11" fill="#888780">action · reasoning · confidence</text>

  <!-- Branch line -->
  <line x1="360" y1="354" x2="360" y2="374" stroke="#5F5E5A" stroke-width="1"/>
  <line x1="100" y1="374" x2="620" y2="374" stroke="#5F5E5A" stroke-width="1"/>

  <!-- Branch drops -->
  <line x1="140" y1="374" x2="140" y2="400" stroke="#e84040" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="360" y1="374" x2="360" y2="400" stroke="#3ddc84" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="580" y1="374" x2="580" y2="400" stroke="#4ea8de" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Branch labels -->
  <text x="140" y="392" text-anchor="middle" font-size="11" fill="#e84040" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">ABORT</text>
  <text x="360" y="392" text-anchor="middle" font-size="11" fill="#3ddc84" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">CONTINUE</text>
  <text x="580" y="392" text-anchor="middle" font-size="11" fill="#4ea8de" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">REPLAN</text>

  <!-- ABORT box -->
  <rect x="62" y="400" width="156" height="48" rx="8" fill="#501313" stroke="#e84040" stroke-width="0.5"/>
  <text x="140" y="420" text-anchor="middle" font-size="13" font-weight="500" fill="#F7C1C1" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">deepracer_stop()</text>
  <text x="140" y="438" text-anchor="middle" font-size="11" fill="#E24B4A">emergency hardware stop</text>

  <!-- CONTINUE box -->
  <rect x="272" y="400" width="176" height="48" rx="8" fill="#173404" stroke="#3ddc84" stroke-width="0.5"/>
  <text x="360" y="420" text-anchor="middle" font-size="13" font-weight="500" fill="#C0DD97" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">execute_step(step)</text>
  <text x="360" y="438" text-anchor="middle" font-size="11" fill="#639922">move · turn · stop</text>

  <!-- REPLAN box -->
  <rect x="500" y="400" width="162" height="48" rx="8" fill="#042C53" stroke="#4ea8de" stroke-width="0.5"/>
  <text x="581" y="420" text-anchor="middle" font-size="13" font-weight="500" fill="#B5D4F4" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">policy.plan()</text>
  <text x="581" y="438" text-anchor="middle" font-size="11" fill="#378ADD">new_instruction → new steps</text>

  <!-- Result arrows down -->
  <line x1="140" y1="448" x2="140" y2="476" stroke="#e84040" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="360" y1="448" x2="360" y2="476" stroke="#3ddc84" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="581" y1="448" x2="581" y2="476" stroke="#4ea8de" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Result labels -->
  <text x="140" y="493" text-anchor="middle" font-size="11" fill="#7a8090">plan ends</text>
  <text x="360" y="488" text-anchor="middle" font-size="11" fill="#7a8090">↻  step N+1</text>
  <text x="581" y="488" text-anchor="middle" font-size="11" fill="#7a8090">↻  restart loop</text>
  <text x="581" y="502" text-anchor="middle" font-size="11" fill="#7a8090">with new steps</text>

  <!-- Loop arrow from CONTINUE back up to top -->
  <path d="M448 424 L660 424 L660 94 L482 94" stroke="#3ddc84" stroke-width="0.8" fill="none" stroke-dasharray="4 3" marker-end="url(#arr-green)" opacity="0.5"/>
  <text x="668" y="264" text-anchor="start" font-size="10" fill="#3ddc84" opacity="0.6">next step</text>

  <!-- SSE push annotation -->
  <rect x="215" y="528" width="290" height="40" rx="6" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="360" y="544" text-anchor="middle" font-size="11" fill="#7a8090">_push(event, data) → _sse_queue → /stream → browser</text>
  <text x="360" y="560" text-anchor="middle" font-size="10" fill="#5F5E5A">step · vision · replan · vision_abort · done</text>

  <!-- Lines from all three outcomes to SSE -->
  <line x1="140" y1="498" x2="140" y2="528" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="360" y1="510" x2="360" y2="528" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="581" y1="510" x2="581" y2="548" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
  <path d="M581 548 L505 548" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2" fill="none"/>

  <!-- Legend -->
  <rect x="40" y="546" width="140" height="58" rx="6" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="52" y="562" font-size="10" fill="#7a8090">Legend</text>
  <rect x="52" y="568" width="10" height="10" rx="2" fill="#501313" stroke="#e84040" stroke-width="0.5"/>
  <text x="68" y="578" font-size="10" fill="#e84040">abort</text>
  <rect x="52" y="582" width="10" height="10" rx="2" fill="#173404" stroke="#3ddc84" stroke-width="0.5"/>
  <text x="68" y="592" font-size="10" fill="#3ddc84">continue</text>
  <rect x="100" y="568" width="10" height="10" rx="2" fill="#042C53" stroke="#4ea8de" stroke-width="0.5"/>
  <text x="116" y="578" font-size="10" fill="#4ea8de">replan</text>
  <rect x="100" y="582" width="10" height="10" rx="2" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="116" y="592" font-size="10" fill="#AFA9EC">vision</text>
</svg>
