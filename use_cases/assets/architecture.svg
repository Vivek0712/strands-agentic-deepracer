<svg width="720" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" style="background:#0a0b0d;font-family:'Barlow',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e4e9" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.06em">PHASE 3 — COMPONENT ARCHITECTURE</text>

  <!-- ── Row 1: Entry points ── -->
  <rect x="40" y="55" width="280" height="52" rx="8" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="180" y="75" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">main.py  --vision</text>
  <text x="180" y="94" text-anchor="middle" font-size="10" fill="#7a8090">terminal REPL · live vision log</text>

  <rect x="400" y="55" width="280" height="52" rx="8" fill="#111318" stroke="#3a3f4a" stroke-width="0.5"/>
  <text x="540" y="75" text-anchor="middle" font-size="12" font-weight="500" fill="#D3D1C7" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">app_ui.py  (Flask)</text>
  <text x="540" y="94" text-anchor="middle" font-size="10" fill="#7a8090">POST /plan · /execute · GET /stream · /frame</text>

  <!-- Arrow from both to CameraPolicy -->
  <line x1="180" y1="107" x2="180" y2="144" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M540 107 L540 130 L360 130 L360 144" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- ── Row 2: CameraPolicy ── -->
  <rect x="80" y="144" width="560" height="62" rx="8" fill="#1f242d" stroke="#BA7517" stroke-width="0.5"/>
  <text x="360" y="165" text-anchor="middle" font-size="13" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">camera_policy.py — CameraPolicy(NavigationPolicy)</text>
  <text x="360" y="182" text-anchor="middle" font-size="10" fill="#888780">plan() → NovaPolicy · assess_step() → VisionAssessor · has_vision=True · camera_stream property</text>
  <text x="360" y="197" text-anchor="middle" font-size="10" fill="#5F5E5A">create_camera_policy() factory · max_replans=3 · min_assess_secs=0.3</text>

  <!-- Arrows down from CameraPolicy -->
  <line x1="200" y1="206" x2="200" y2="254" stroke="#AFA9EC" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="360" y1="206" x2="360" y2="254" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="540" y1="206" x2="540" y2="254" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <text x="200" y="240" text-anchor="middle" font-size="9" fill="#7F77DD">plan()</text>
  <text x="360" y="240" text-anchor="middle" font-size="9" fill="#7F77DD">assess_step()</text>
  <text x="540" y="240" text-anchor="middle" font-size="9" fill="#1D9E75">MJPEG frames</text>

  <!-- ── Row 3: Three components ── -->
  <!-- NovaPolicy / agent.py -->
  <rect x="40" y="254" width="240" height="62" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="160" y="274" text-anchor="middle" font-size="12" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">agent.py — NovaPolicy</text>
  <text x="160" y="291" text-anchor="middle" font-size="10" fill="#AFA9EC">Strands Agent → Nova Lite</text>
  <text x="160" y="307" text-anchor="middle" font-size="10" fill="#7F77DD">15 patterns · rotation math</text>

  <!-- VisionAssessor -->
  <rect x="240" y="254" width="240" height="62" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="360" y="274" text-anchor="middle" font-size="12" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">vision_assessor.py</text>
  <text x="360" y="291" text-anchor="middle" font-size="10" fill="#AFA9EC">VisionAssessor → Nova Pro</text>
  <text x="360" y="307" text-anchor="middle" font-size="10" fill="#7F77DD">raw bytes · timeout 4s · safe_continue()</text>

  <!-- CameraStream -->
  <rect x="440" y="254" width="240" height="62" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="560" y="274" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">camera_stream.py</text>
  <text x="560" y="291" text-anchor="middle" font-size="10" fill="#5DCAA5">daemon thread · SOI/EOI parse</text>
  <text x="560" y="307" text-anchor="middle" font-size="10" fill="#1D9E75">_latest_frame · Lock · &lt;1ms read</text>

  <!-- Arrows down to externals -->
  <line x1="160" y1="316" x2="160" y2="360" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="360" y1="316" x2="360" y2="360" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="560" y1="316" x2="560" y2="360" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- ── Row 4: External services ── -->
  <rect x="40" y="360" width="240" height="52" rx="8" fill="#111318" stroke="#534AB7" stroke-width="0.5"/>
  <text x="160" y="381" text-anchor="middle" font-size="12" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">Amazon Bedrock</text>
  <text x="160" y="399" text-anchor="middle" font-size="10" fill="#AFA9EC">Nova Lite  us.amazon.nova-lite-v1:0</text>

  <rect x="240" y="360" width="240" height="52" rx="8" fill="#111318" stroke="#534AB7" stroke-width="0.5"/>
  <text x="360" y="381" text-anchor="middle" font-size="12" font-weight="500" fill="#CECBF6" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">Amazon Bedrock</text>
  <text x="360" y="399" text-anchor="middle" font-size="10" fill="#AFA9EC">Nova Pro  us.amazon.nova-pro-v1:0</text>

  <rect x="440" y="360" width="240" height="52" rx="8" fill="#111318" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="560" y="381" text-anchor="middle" font-size="12" font-weight="500" fill="#9FE1CB" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">AWS DeepRacer</text>
  <text x="560" y="399" text-anchor="middle" font-size="10" fill="#5DCAA5">ROS2 · /display_mjpeg · MJPEG stream</text>

  <!-- DeepRacerTool on right side -->
  <rect x="596" y="144" width="0" height="0"/> <!-- spacer -->

  <!-- DeepRacerTool box -->
  <rect x="40" y="432" width="640" height="36" rx="6" fill="#1f242d" stroke="#f5a623" stroke-width="0.5"/>
  <text x="360" y="449" text-anchor="middle" font-size="12" font-weight="500" fill="#FAC775" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.05em">deepracer_agent_tool.py — DeepRacerTool(AgentTool)  ·  _execute_approved_plan()  ·  SSE event_callback  ·  TaskStatus FSM</text>
  <text x="360" y="463" text-anchor="middle" font-size="10" fill="#888780">deepracer_tools.py  ·  activate_camera() PUT /api/vehicle/media_state  ·  @tool move/turn/stop</text>

  <!-- Arrows from row3 down to DeepRacerTool -->
  <line x1="160" y1="412" x2="160" y2="432" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="360" y1="412" x2="360" y2="432" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="560" y1="412" x2="560" y2="432" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 2"/>
</svg>
