<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strands × DeepRacer — Navigation Planner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f8f9fa;
      background: radial-gradient(circle at top left, #1b4b9b 0, #040816 55%, #02030a 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/assets/deepracer_bg.png");
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      pointer-events: none;
      filter: grayscale(10%);
      z-index: -2;
    }
    .app-shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .brand-logos {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand-logos img {
      height: 32px;
      object-fit: contain;
    }
    .brand-title {
      display: flex;
      flex-direction: column;
    }
    .brand-title span:first-child {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }
    .brand-title span:last-child {
      font-size: 1.05rem;
      font-weight: 600;
    }
    .badge-phase {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(13, 110, 253, 0.16);
      border: 1px solid rgba(13, 110, 253, 0.6);
      color: #cfe2ff;
      white-space: nowrap;
    }
    .card {
      background: radial-gradient(circle at top left, rgba(49, 95, 181, 0.4), rgba(5, 10, 30, 0.95));
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
      padding: 1.25rem 1.5rem 1.1rem;
      backdrop-filter: blur(20px);
    }
    .chat-layout {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2.3fr);
      gap: 1.25rem;
    }
    @media (max-width: 768px) {
      .chat-layout {
        grid-template-columns: minmax(0, 1fr);
      }
      .card {
        padding: 1.1rem 1rem 1rem;
      }
    }
    .label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }
    .prompt-row {
      display: flex;
      gap: 0.6rem;
    }
    #prompt {
      flex: 1;
      padding: 0.7rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.75);
      color: #e5e7eb;
      font-size: 0.9rem;
      outline: none;
    }
    #prompt::placeholder {
      color: #64748b;
    }
    #prompt:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }
    button {
      padding: 0.6rem 1.3rem;
      border-radius: 999px;
      border: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.06s ease, box-shadow 0.12s ease;
      white-space: nowrap;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0d6efd, #38bdf8);
      color: #f9fafb;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.55);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #0b5ed7, #22c1f1);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.7);
    }
    .btn-success {
      background: linear-gradient(135deg, #16a34a, #4ade80);
      color: #022c22;
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.55);
    }
    .btn-success:hover:not(:disabled) {
      background: linear-gradient(135deg, #15803d, #22c55e);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.7);
    }
    .btn-outline {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.8);
    }
    .btn-outline:hover:not(:disabled) {
      background: rgba(15, 23, 42, 0.8);
    }
    .plan-box h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 0.6rem;
      color: #e5e7eb;
    }
    .plan-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 0.88rem;
      color: #cbd5f5;
    }
    .plan-steps li {
      padding: 0.25rem 0;
      border-bottom: 1px dashed rgba(148, 163, 184, 0.25);
    }
    .plan-steps li:last-child {
      border-bottom: none;
    }
    .plan-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.75rem;
    }
    .chat-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .chat-bubble {
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      font-size: 0.9rem;
      line-height: 1.4;
      max-width: 100%;
    }
    .chat-user {
      align-self: flex-end;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.7);
      color: #e5e7eb;
    }
    .chat-agent {
      align-self: flex-start;
      background: rgba(15, 118, 110, 0.16);
      border: 1px solid rgba(34, 211, 238, 0.4);
      color: #e0f2fe;
    }
    .result-box {
      margin-top: 0.6rem;
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      font-size: 0.86rem;
    }
    .result-box.loading {
      background: rgba(37, 99, 235, 0.16);
      color: #bfdbfe;
    }
    .result-box.success {
      background: rgba(22, 163, 74, 0.16);
      color: #bbf7d0;
    }
    .result-box.error {
      background: rgba(220, 38, 38, 0.16);
      color: #fecaca;
    }
    .result-box.hidden {
      display: none;
    }
    .status {
      font-size: 0.78rem;
      color: #cbd5f5;
      opacity: 0.8;
      margin-top: 0.25rem;
    }
    .footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: #cbd5f5;
      opacity: 0.9;
      padding-top: 0.25rem;
    }
    .footer a {
      color: #7dd3fc;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand">
        <div class="brand-logos">
          <img src="/assets/strands-logo.png" alt="Strands logo">
          <span style="color:#94a3b8;">×</span>
          <img src="/assets/deepracer-logo.png" alt="DeepRacer logo">
        </div>
        <div class="brand-title">
          <span>Agentic navigation</span>
          <span>DeepRacer Planner</span>
        </div>
      </div>
      <span class="badge-phase">Phase 1 · Planner</span>
    </header>

    <main class="card chat-layout">
      <section class="chat-card">
        <label class="label" for="prompt">Chat with your DeepRacer</label>
        <div class="prompt-row">
          <input
            type="text"
            id="prompt"
            placeholder="e.g. Move forward 2 seconds, then turn left 1 second and stop"
            autocomplete="off"
          >
          <button type="button" class="btn-primary" id="getPlan">Plan</button>
        </div>
        <div id="chatHistory"></div>
        <div class="result-box hidden" id="resultBox"></div>
        <p class="status" id="status"></p>
      </section>

      <section class="plan-box" id="planBox" style="display: none;">
        <h2>Planned steps</h2>
        <ol class="plan-steps" id="planSteps"></ol>
        <div class="plan-actions">
          <button type="button" class="btn-success" id="execute">Execute</button>
          <button type="button" class="btn-outline" id="cancel">Cancel</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>By Vivek Raja P S</span>
      <span>
        <a href="https://github.com/Vivek072" target="_blank" rel="noopener noreferrer">GitHub</a> ·
        <a href="https://linkedin.com/in/meetvivekraja" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </span>
    </footer>
  </div>

  <script>
    const promptInput = document.getElementById('prompt');
    const getPlanBtn = document.getElementById('getPlan');
    const planBox = document.getElementById('planBox');
    const planSteps = document.getElementById('planSteps');
    const executeBtn = document.getElementById('execute');
    const cancelBtn = document.getElementById('cancel');
    const chatHistory = document.getElementById('chatHistory');
    const resultBox = document.getElementById('resultBox');
    const statusEl = document.getElementById('status');

    let currentPlan = null;

    function setStatus(msg) { statusEl.textContent = msg || ''; }
    function showResult(text, type) {
      resultBox.textContent = text;
      resultBox.className = 'result-box ' + (type || '');
      resultBox.classList.remove('hidden');
    }
    function hideResult() {
      resultBox.className = 'result-box hidden';
    }

    function addChatBubble(text, who) {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'chat-bubble ' + (who === 'user' ? 'chat-user' : 'chat-agent');
      div.textContent = text;
      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function formatPlanSummary(steps) {
      if (!steps || !steps.length) return 'No steps.';
      return steps.map((s, i) => {
        const sec = s.seconds != null ? ` ${s.seconds}s` : '';
        return `${i + 1}. ${s.action}${sec}`;
      }).join(' → ');
    }

    getPlanBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return;
      getPlanBtn.disabled = true;
      setStatus('Planning…');
      hideResult();
      planBox.style.display = 'none';
      try {
        const res = await fetch('/api/plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        if (!res.ok) {
          showResult(data.error || 'Failed to get plan', 'error');
          setStatus('');
          return;
        }
        currentPlan = data.plan;
        const steps = data.plan.steps || [];
        planSteps.innerHTML = steps.map((s, i) => {
          const sec = s.seconds != null ? ` ${s.seconds}s` : '';
          return `<li>${i + 1}. ${s.action}${sec}</li>`;
        }).join('');
        planBox.style.display = 'block';
        // Show only this exchange: clear chat, then one user + one agent (plan summary)
        chatHistory.innerHTML = '';
        addChatBubble(prompt, 'user');
        addChatBubble('Plan: ' + formatPlanSummary(steps), 'agent');
        showResult('', '');
        setStatus('');
      } catch (e) {
        showResult(e.message || 'Request failed', 'error');
        setStatus('');
      } finally {
        getPlanBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', () => {
      planBox.style.display = 'none';
      currentPlan = null;
      hideResult();
      setStatus('');
    });

    executeBtn.addEventListener('click', async () => {
      if (!currentPlan) return;
      executeBtn.disabled = true;
      setStatus('Executing…');
      showResult('Executing plan…', 'loading');
      try {
        const res = await fetch('/api/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan: currentPlan })
        });
        const data = await res.json();
        if (!res.ok) {
          showResult(data.error || 'Execution failed', 'error');
          setStatus('');
          executeBtn.disabled = false;
          return;
        }
        const n = (data.results || []).length;
        showResult(data.ok ? `Done. ${n} step${n !== 1 ? 's' : ''} executed.` : (data.error || 'Failed'), data.ok ? 'success' : 'error');
        setStatus('');
      } catch (e) {
        showResult(e.message || 'Request failed', 'error');
        setStatus('');
      } finally {
        executeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
